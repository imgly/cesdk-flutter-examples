// highlight-kotlin-block
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.11.0" apply false
    id "com.android.library" version "8.11.0" apply false
    // highlight-kotlin
    id 'org.jetbrains.kotlin.android' version "1.9.10" apply false
    // highlight-kotlin
    id 'com.github.gmazzo.buildconfig' version "5.3.5" apply false
}

// highlight-kotlin-compiler
gradle.ext.kotlinCompilerExtensionVersion = "1.5.3"
// highlight-kotlin-compiler

rootProject.name = "CE.SDK Flutter Android Examples"
include ":app"
// highlight-kotlin-block

// Internal use only
def editorDir = file("../../../../apps/cesdk_android")
def pubSpecOverrideDst = file("../../showcases/pubspec_overrides.yaml")
if (editorDir.exists() && System.getenv("UBQ_ANDROID_USE_ARTIFACTS") != "true") {
    // Use local imgly plugins
    def pubSpecOverrideSrc = file("../../shared/pubspec_overrides.yaml")
    if (pubSpecOverrideSrc.exists()) {
        pubSpecOverrideDst.text = pubSpecOverrideSrc.text
    }
    // Note that settings.gradle files of imgly_editor and imgly_camera plugins are ignored when
    // they are included in this flutter project since flutter treats them as modules and
    // not subprojects. That is why we need to add substitution here as well.
    includeBuild(editorDir) {
        name "editor"
        dependencySubstitution {
            substitute module('ly.img:editor') using project(':editor')
            substitute module('ly.img:camera') using project(':camera')
        }
    }
} else {
    pubSpecOverrideDst.delete()
}
// Internal use only
